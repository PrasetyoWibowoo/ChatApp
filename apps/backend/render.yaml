services:
  # Backend Web Service
  - type: web
    name: chatapp-backend
    env: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: ./apps/backend
    healthCheckPath: /health
    envVars:
      - key: RUST_LOG
        value: info
      - key: BIND_ADDR
        value: 0.0.0.0:8080
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
